apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argocd.private
spec:
  sourceRepos:
    - ssh://git@github.com/Sigurs/gitops-private.git
  sourceNamespaces: []
  destinations: 
    - server: https://kubernetes.default.svc
      namespace: ''
    - server: https://kubernetes.default.svc
      namespace: 'argocd'
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceBlacklist:
    - group: ''
      kind: '*'