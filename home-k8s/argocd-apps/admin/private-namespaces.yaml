apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: private-namespaces
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
spec:
  project: argocd.private
  source:
    repoURL: https://github.com/Sigurs/gitops-private.git
    targetRevision: HEAD
    path: home-k8s/namespaces
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - ServerSideApply=true