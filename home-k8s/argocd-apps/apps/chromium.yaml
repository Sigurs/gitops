apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chromium
spec:
  project: home-k8s
  source:
    repoURL: https://github.com/Sigurs/gitops.git
    targetRevision: HEAD
    path: home-k8s/apps/chromium
  destination:
    server: https://kubernetes.default.svc
    namespace: apps-chromium
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
