apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromium
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chromium
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromium
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: chromium
          image: ghcr.io/browserless/chromium:latest
          securityContext:
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/playwright-seccomp.json
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: chromium-api
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
      # Pinned to the node that carries the localhost seccomp profile
      nodeSelector:
        kubernetes.io/hostname: home-k8s01.sigurs.io
