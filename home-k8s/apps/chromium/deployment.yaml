apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromium
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chromium
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chromium
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: chromium
          image: mcr.microsoft.com/playwright::latest
          securityContext:
            seccompProfile:
              type: Localhost
              localhostProfile: profiles/playwright-seccomp.json
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: chromium-api
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "1Gi"
      # Pinned to the node that carries the localhost seccomp profile
      nodeSelector:
        kubernetes.io/hostname: home-k8s01.sigurs.io
