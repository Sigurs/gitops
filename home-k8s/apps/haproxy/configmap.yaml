apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy
data:
  haproxy.cfg: |
    global
        log stdout format raw local0

    defaults
        log     global
        mode    tcp
        option  tcplog
        timeout connect 5000ms
        timeout client  50000ms
        timeout server  50000ms

    # The Frontend listens for incoming traffic
    frontend ollama
        bind *:11434
        default_backend ollama_failover_backend

    # The Backend handles the failover logic
    backend ollama_failover_backend
        # Option 1: Simple TCP check (Connects to port to see if it's open)
        option tcp-check
        
        # HOST nirah (Primary)
        # 'check' enables health checking. 
        # 'inter 2s' checks every 2 seconds.
        # 'fall 3' marks it down after 3 failed checks.
        server primary_host 172.20.1.20:11434 check inter 2s fall 3 rise 2
        
        # HOST unraid (Secondary/Backup)
        # 'backup' ensures this is ONLY used if 'primary_host' is down.
        server backup_host 172.20.4.10:11434 check inter 2s fall 3 rise 2 backup