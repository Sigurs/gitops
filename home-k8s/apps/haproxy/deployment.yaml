apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: haproxy
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: haproxy
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: haproxy
          image: haproxy:3.3-alpine@sha256:782195506ce75120a2e917891088419884924f184cf84fb81a98b6eedb86b067
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 11434
              name: ollama
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
      volumes:
      - name: config
        configMap:
          name: haproxy