apiVersion: apps/v1
kind: Deployment
metadata:
  name: hass
spec:
  template:
    spec:
      containers:
        - name: hass
          image: ghcr.io/home-assistant/home-assistant:2026.5.2@sha256:36ceed9e9682adfcb9bbea409a925dd2ffd5db562098969389dc59e8090fb63a
      # We want this deployment on a specific node
      nodeSelector:
        kubernetes.io/hostname: home-k8s01.sigurs.io