apiVersion: apps/v1
kind: Deployment
metadata:
  name: change-detection
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: change-detection
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: change-detection
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: change-detection
          image: dgtlmoon/changedetection.io:0.55.7
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: PLAYWRIGHT_DRIVER_URL
              # v1 url — chromium now runs in the apps-chromium namespace
              value: ws://chromium.apps-chromium.svc:3000/?stealth=1&--headless=true&--window-size%3D1920%2C1080
          volumeMounts:
            - name: change-detection
              mountPath: /datastore
              subPath: datastore
      volumes:
        - name: change-detection
          persistentVolumeClaim:
            claimName: change-detection
      # We want this deployment on a specific node
      nodeSelector:
        kubernetes.io/hostname: home-k8s01.sigurs.io