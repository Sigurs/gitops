apiVersion: apps/v1
kind: Deployment
metadata:
  name: change-detection
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: change-detection
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: change-detection
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: chromium
          image: ghcr.io/browserless/chromium:latest
          securityContext:
            allowPrivilegeEscalation: false
            type: Localhost
            localhostProfile: profiles/playwright-seccomp.json
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: chromium-api
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
        - name: change-detection
          image: dgtlmoon/changedetection.io:0.55.7
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Helsinki
            - name: PLAYWRIGHT_DRIVER_URL
              # v1 url
              value: ws://localhost:3000/?stealth=1&--headless=true&--window-size%3D1920%2C1080
#              value: ws://localhost:3000/chromium?launch={"defaultViewport":{"height":720,"width":1280},"headless":false,"stealth":true}&blockAds=true
          volumeMounts:
            - name: change-detection
              mountPath: /datastore
              subPath: datastore
      volumes:
        - name: change-detection
          persistentVolumeClaim:
            claimName: change-detection
      # We want this deployment on a specific node
      nodeSelector:
        kubernetes.io/hostname: home-k8s01.sigurs.io