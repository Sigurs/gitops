apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      containers:
        - name: container
          image: ghcr.io/searxng/searxng:2026.7.9-b512eaa27@sha256:081e65c1495baeb8f193e4bcb03f78dde2dcbbd3c1d67293bce645596a7834db
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          env:
            - name: SEARXNG_BASE_URL
              value: "https://search.sigurs.io"

            # Security
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng
                  key: SEARXNG_SECRET

            - name: TZ
              value: Europe/Helsinki
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: searxng
              mountPath: /etc/searxng
              subPath: etc/searxng
            - name: searxng
              mountPath: /var/cache/searxng
              subPath: var/cache/searxng
      volumes:
        - name: searxng
          persistentVolumeClaim:
            claimName: searxng